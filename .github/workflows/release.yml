name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"

          # v1.0.0-beta.1 → IS_BETA=true, BASE=1.0.0
          # v1.0.0         → IS_BETA=false, BASE=1.0.0
          if [[ "$TAG" == *"-beta"* ]]; then
            IS_BETA=true
            BASE_VERSION="${TAG%%-*}"
          else
            IS_BETA=false
            BASE_VERSION="$TAG"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "VERSION_NAME=$TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=$CODE" >> "$GITHUB_OUTPUT"
          echo "TAG=v$TAG" >> "$GITHUB_OUTPUT"
          echo "IS_BETA=$IS_BETA" >> "$GITHUB_OUTPUT"
          echo "Parsed: v$TAG → versionCode=$CODE, beta=$IS_BETA"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      - name: Expose Android NDK path
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk/ | sort -V | tail -1)" >> $GITHUB_ENV

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            server-rs/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('server-rs/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > $GITHUB_WORKSPACE/release.jks

      - name: Configure API keys
        run: |
          echo "api.hmac.key=${{ secrets.API_HMAC_KEY }}" >> local.properties
          echo "api.ec.public.key=${{ secrets.API_EC_PUBLIC_KEY }}" >> local.properties
          echo "activation.ed25519.public.key=${{ secrets.ACTIVATION_PUBLIC_KEY }}" >> local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}

      - name: Build release APKs
        env:
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Popenmonitor.signing.storeFile=${{ github.workspace }}/release.jks \
            -Popenmonitor.signing.storePassword=${{ secrets.STORE_PASSWORD }} \
            -Popenmonitor.signing.keyAlias=opmonitor

      - name: Rename APKs
        id: apks
        env:
          V: ${{ steps.version.outputs.VERSION_NAME }}
          C: ${{ steps.version.outputs.VERSION_CODE }}
        run: |
          OUT=app/build/outputs/apk/release
          mkdir -p release-artifacts
          for apk in "$OUT"/app-*-release.apk; do
            base=$(basename "$apk")
            abi=$(echo "$base" | sed 's/app-\(.*\)-release.apk/\1/')
            new="OpenMonitor-v${V}_${C}-${abi}-release.apk"
            cp "$apk" "release-artifacts/$new"
            echo "  $new ($(du -h "release-artifacts/$new" | cut -f1))"
          done
          ls release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-apks-${{ steps.version.outputs.TAG }}
          path: release-artifacts/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "OpenMonitor ${{ steps.version.outputs.TAG }}"
          prerelease: ${{ steps.version.outputs.IS_BETA == 'true' }}
          generate_release_notes: true
          files: release-artifacts/*.apk
