name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # v1.2.3 → VERSION_NAME=1.2.3, VERSION_CODE=10203
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "VERSION_NAME=$TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=$CODE" >> "$GITHUB_OUTPUT"
          echo "TAG=v$TAG" >> "$GITHUB_OUTPUT"
          echo "Parsed: v$TAG → versionCode=$CODE"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: monitor-daemon/go.sum

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > $GITHUB_WORKSPACE/release.jks

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APKs
        env:
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APKs
        id: apks
        env:
          V: ${{ steps.version.outputs.VERSION_NAME }}
          C: ${{ steps.version.outputs.VERSION_CODE }}
        run: |
          OUT=app/build/outputs/apk/release
          mkdir -p release-artifacts
          for apk in "$OUT"/app-*-release.apk; do
            base=$(basename "$apk")
            # app-arm64-v8a-release.apk → OpenMonitor-v1.2.3_10203-arm64-v8a-release.apk
            abi=$(echo "$base" | sed 's/app-\(.*\)-release.apk/\1/')
            new="OpenMonitor-v${V}_${C}-${abi}-release.apk"
            cp "$apk" "release-artifacts/$new"
            echo "  $new ($(du -h "release-artifacts/$new" | cut -f1))"
          done
          ls release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: OpenMonitor ${{ steps.version.outputs.TAG }}
          generate_release_notes: true
          files: release-artifacts/*.apk
