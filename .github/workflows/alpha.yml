name: Alpha

on:
  repository_dispatch:
    types: [ release_alpha ]

jobs:
  alpha:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Extract version info
        id: version
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          # Strip leading 'v' for version parsing
          VER="${TAG#v}"
          # BASE_VERSION strips -alpha[.*] suffix for versionCode calculation
          BASE_VERSION="${VER%%-alpha*}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "VERSION_NAME=$VER" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=$CODE" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "Parsed: $TAG → versionName=$VER, versionCode=$CODE"

      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          repository: 1orz/OpenMonitor-src
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.client_payload.tag }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      - name: Expose Android NDK path
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk/ | sort -V | tail -1)" >> $GITHUB_ENV

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            daemon-rust/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('daemon-rust/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > $GITHUB_WORKSPACE/release.jks

      - name: Configure API keys
        run: |
          echo "api.hmac.key=${{ secrets.API_HMAC_KEY }}" >> local.properties
          echo "api.ec.public.key=${{ secrets.API_EC_PUBLIC_KEY }}" >> local.properties
          echo "activation.ed25519.public.key=${{ secrets.ACTIVATION_PUBLIC_KEY }}" >> local.properties
          echo "daemon.handshake.key=${{ secrets.DAEMON_HANDSHAKE_KEY }}" >> local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}

      - name: Build alpha APKs
        env:
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          ./gradlew assembleAlpha \
            -Popenmonitor.signing.storeFile=${{ github.workspace }}/release.jks \
            -Popenmonitor.signing.storePassword=${{ secrets.STORE_PASSWORD }} \
            -Popenmonitor.signing.keyAlias=opmonitor

      - name: Rename APKs
        id: apks
        env:
          V: ${{ steps.version.outputs.VERSION_NAME }}
          C: ${{ steps.version.outputs.VERSION_CODE }}
        run: |
          OUT=app/build/outputs/apk/alpha
          mkdir -p release-artifacts
          for apk in "$OUT"/app-*-alpha.apk; do
            base=$(basename "$apk")
            abi=$(echo "$base" | sed 's/app-\(.*\)-alpha.apk/\1/')
            new="OpenMonitor-v${V}_${C}-${abi}-alpha.apk"
            cp "$apk" "release-artifacts/$new"
            echo "  $new ($(du -h "release-artifacts/$new" | cut -f1))"
          done
          ls release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: alpha-apks-${{ steps.version.outputs.TAG }}
          path: release-artifacts/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "OpenMonitor ${{ steps.version.outputs.TAG }} (Alpha)"
          prerelease: true
          generate_release_notes: true
          files: release-artifacts/*.apk

      - name: Notify Telegram
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "-1003901540451"
          TELEGRAM_THREAD_ID: "7"
          TELEGRAM_CHAT_USER: "OpenMonitor"
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          TAG: ${{ steps.version.outputs.TAG }}
          CHANNEL: alpha
          APK_DIR: release-artifacts
        run: bash scripts/telegram-notify-release.sh
