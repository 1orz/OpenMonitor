name: Build

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      - name: Expose Android NDK path
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk/ | sort -V | tail -1)" >> $GITHUB_ENV

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore \
              -storepass android -keypass android -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            server-rs/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('server-rs/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Configure API keys
        run: |
          echo "api.hmac.key=${{ secrets.API_HMAC_KEY }}" >> local.properties
          echo "api.ec.public.key=${{ secrets.API_EC_PUBLIC_KEY }}" >> local.properties
          echo "activation.ed25519.public.key=${{ secrets.ACTIVATION_PUBLIC_KEY }}" >> local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Lint
        run: ./gradlew :app:lintDebug

      - name: Upload debug APK (arm64-v8a)
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-arm64-v8a
          path: app/build/outputs/apk/debug/*arm64-v8a*.apk

      - name: Upload debug APK (armeabi-v7a)
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-armeabi-v7a
          path: app/build/outputs/apk/debug/*armeabi-v7a*.apk

      - name: Upload debug APK (universal)
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-universal
          path: app/build/outputs/apk/debug/*universal*.apk
