name: Build

on:
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache-dependency-path: monitor-daemon/go.sum

      - name: Build monitor-daemon
        run: |
          COMMIT=$(git log -1 --format=%h -- monitor-daemon)
          LDFLAGS="-s -w -X monitor-daemon/collector.GitCommit=$COMMIT"
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/assets/daemon
          cd monitor-daemon
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags "$LDFLAGS" \
            -o ../app/src/main/jniLibs/arm64-v8a/libmonitor-daemon.so \
            ./cmd/daemon
          echo "$COMMIT" > ../app/src/main/assets/daemon/daemon-commit.txt

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > $GITHUB_WORKSPACE/release.jks

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build APKs
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleDebug assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
