name: Build

on:
  repository_dispatch:
    types: [ build ]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit to build from source repo'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          repository: 1orz/OpenMonitor-src
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.client_payload.ref || inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      - name: Expose Android NDK path
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk/ | sort -V | tail -1)" >> $GITHUB_ENV

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > $GITHUB_WORKSPACE/release.jks

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            daemon-rust/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('daemon-rust/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Configure API keys
        run: |
          echo "api.hmac.key=${{ secrets.API_HMAC_KEY }}" >> local.properties
          echo "api.ec.public.key=${{ secrets.API_EC_PUBLIC_KEY }}" >> local.properties
          echo "activation.ed25519.public.key=${{ secrets.ACTIVATION_PUBLIC_KEY }}" >> local.properties
          echo "daemon.handshake.key=${{ secrets.DAEMON_HANDSHAKE_KEY }}" >> local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}

      - name: Build debug APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          ./gradlew assembleDebug \
            -Popenmonitor.signing.storeFile=${{ github.workspace }}/release.jks \
            -Popenmonitor.signing.storePassword=${{ secrets.STORE_PASSWORD }} \
            -Popenmonitor.signing.keyAlias=opmonitor

      - name: Lint
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          ./gradlew :app:lintDebug \
            -Popenmonitor.signing.storeFile=${{ github.workspace }}/release.jks \
            -Popenmonitor.signing.storePassword=${{ secrets.STORE_PASSWORD }} \
            -Popenmonitor.signing.keyAlias=opmonitor

      - name: Upload debug APK (arm64-v8a)
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-arm64-v8a
          path: app/build/outputs/apk/debug/*arm64-v8a*.apk

      - name: Upload debug APK (armeabi-v7a)
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-armeabi-v7a
          path: app/build/outputs/apk/debug/*armeabi-v7a*.apk

      - name: Upload debug APK (universal)
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-universal
          path: app/build/outputs/apk/debug/*universal*.apk
